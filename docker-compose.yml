services:
  nginx:
    image: nginx:alpine
    container_name: kiko-nginx
    ports:
      - "3010:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - kiko-network
    restart: unless-stopped

networks:
  kiko-network:
    name: kiko-network
    external: true
