name: Auto Fix Bug

on:
  issues:
    types: [labeled]

jobs:
  fix-bug:
    if: github.event.label.name == 'bug'
    runs-on: [self-hosted, kiko]

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Get issue details
        id: issue
        run: |
          TITLE=$(gh issue view "$ISSUE_NUMBER" --json title -q .title)
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          cat > /tmp/issue_context.txt <<EOF
          [Bug Issue #${ISSUE_NUMBER}] ${TITLE}

          ${BODY}
          EOF

      - name: Create fix branch
        run: |
          BRANCH="fix/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Fix bug with Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_CONTEXT=$(cat /tmp/issue_context.txt)

          claude -p \
            --dangerously-skip-permissions \
            --max-turns 30 \
            "다음 버그 이슈를 분석하고 수정해줘.
            수정 후 반드시 pnpm test를 실행해서 테스트가 통과하는지 확인해.
            테스트가 실패하면 수정해서 통과시켜.

            ${ISSUE_CONTEXT}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes were made"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "$(cat <<EOF
          fix: resolve #${ISSUE_NUMBER} - ${{ steps.issue.outputs.title }}

          Automated fix by Claude Code

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
          EOF
          )"
          git push origin "$BRANCH"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        id: pr
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "fix: resolve #${ISSUE_NUMBER} - ${{ steps.issue.outputs.title }}" \
            --body "$(cat <<'PREOF'
          ## Summary
          Automated bug fix for #${{ github.event.issue.number }}

          ## Test plan
          - [ ] CI 테스트 통과 확인
          - [ ] 수동 검증

          🤖 Generated by Claude Code (auto-fix-bug workflow)
          PREOF
          )")

          PR_NUMBER=$(gh pr view "$PR_URL" --json number -q .number)
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Wait for CI checks
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "Waiting for CI checks on PR #${{ steps.pr.outputs.number }}..."
          sleep 10
          gh pr checks "${{ steps.pr.outputs.number }}" --watch --fail-fast

      - name: Claude Code review
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(gh pr diff "${{ steps.pr.outputs.number }}")

          REVIEW=$(claude -p --dangerously-skip-permissions --max-turns 5 \
            "다음 PR diff를 리뷰해줘. 한국어로 간결하게 작성해.
            - 변경 사항 요약
            - 잠재적 문제점
            - 개선 제안

            ${DIFF}")

          gh pr comment "${{ steps.pr.outputs.number }}" --body "$(cat <<EOF
          ## 🤖 Claude Code Review

          ${REVIEW}
          EOF
          )"

      - name: Merge PR
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch

      - name: Bump patch version and release
        if: steps.changes.outputs.has_changes == 'true'
        id: release
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v1.0.0")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi

          # Parse version and bump patch
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          NEW_TAG="${{ steps.release.outputs.tag }}"
          PREV_TAG="${{ steps.release.outputs.prev_tag }}"
          ISSUE_TITLE="${{ steps.issue.outputs.title }}"

          # Collect commits since last tag
          git fetch origin main --tags
          COMMITS=$(git log "${PREV_TAG}..origin/main" --oneline 2>/dev/null || echo "- fix: resolve #${ISSUE_NUMBER}")

          gh release create "$NEW_TAG" \
            --target main \
            --title "${NEW_TAG} - bugfix" \
            --notes "$(cat <<EOF
          ## Bug Fix

          - resolve #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ## Commits since ${PREV_TAG}

          ${COMMITS}

          ---
          🤖 Auto-released by Claude Code
          EOF
          )"

      - name: Close issue
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          gh issue close "$ISSUE_NUMBER" --comment "🤖 자동 수정 완료! PR ${{ steps.pr.outputs.url }} 머지 → ${{ steps.release.outputs.tag }} 릴리즈 완료."

      - name: Comment if no fix
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "🤖 자동 수정을 시도했지만 코드 변경사항을 생성하지 못했습니다. 수동 확인이 필요합니다."
